name: Build And Release Win64

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: win64-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Compile tests (no run)
        run: cargo test --locked --no-run

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64-exe
          path: target/release/vrmemoir.exe
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: win64-exe
          path: dist

      - name: Prepare release files
        id: prep
        shell: pwsh
        run: |
          $meta = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $pkg = $meta.packages[0]
          $name = $pkg.name
          $version = $pkg.version

          if ($env:GITHUB_REF -match "^refs/tags/(.*)$") {
            $tag = $Matches[1]
          } else {
            $tag = "v$version-build.$env:GITHUB_RUN_NUMBER"
          }
          $binaryName = "$name-$version-windows-x86_64.exe"

          Move-Item -Path "dist/vrmemoir.exe" -Destination "dist/$binaryName" -Force

          $hash = (Get-FileHash -Algorithm SHA256 "dist/$binaryName").Hash.ToLower()
          $shaFile = "dist/$binaryName.sha256"
          "$hash  $binaryName" | Out-File -FilePath $shaFile -Encoding ascii

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "binary=$binaryName" >> $env:GITHUB_OUTPUT
          "sha_file=$(Split-Path -Leaf $shaFile)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          name: ${{ steps.prep.outputs.name }} ${{ steps.prep.outputs.version }} (build ${{ github.run_number }})
          generate_release_notes: true
          files: |
            dist/${{ steps.prep.outputs.binary }}
            dist/${{ steps.prep.outputs.sha_file }}
