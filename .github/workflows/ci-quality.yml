name: CI Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: fmt + clippy + test + metrics
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      MIN_TOTAL_TESTS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Path ".ci-metrics" -ItemType Directory -Force | Out-Null
          cargo test --all-targets --all-features -- --nocapture 2>&1 | Tee-Object -FilePath ".ci-metrics/test-output.log"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build test metrics
        if: always()
        shell: pwsh
        run: |
          ./.github/scripts/collect_test_metrics.ps1 -LogPath ".ci-metrics/test-output.log" -OutDir ".ci-metrics"

      - name: Enforce minimum test count
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $metricsPath = ".ci-metrics/test-metrics.json"
          if (-not (Test-Path $metricsPath)) {
            throw "Metrics file not found: $metricsPath"
          }
          $metrics = Get-Content -Path $metricsPath -Raw | ConvertFrom-Json
          $minTests = [int]$env:MIN_TOTAL_TESTS
          if ([int]$metrics.total -lt $minTests) {
            throw "Total tests $($metrics.total) is below required minimum $minTests."
          }

      - name: Upload test metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-metrics-${{ github.run_id }}
          path: .ci-metrics
          if-no-files-found: error
