services:
  builder:
    build: .
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-cache-git:/usr/local/cargo/git
    environment:
      - CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=x86_64-w64-mingw32-gcc
    # 如果你想让它构建完后自动把产物放到容易找的地方
    command: >
      sh -c "cargo build --release --target x86_64-pc-windows-gnu && 
             mkdir -p test &&
             cp target/x86_64-pc-windows-gnu/release/vrmemoir.exe ./test/vrmemoir.exe"

volumes:
  cargo-cache:
  cargo-cache-git:
